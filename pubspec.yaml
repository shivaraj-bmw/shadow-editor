name: smartlayer_ai_editor
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  image_picker: ^1.2.2
  image: ^4.1.7
  permission_handler: ^11.4.0
  screenshot: ^3.0.0
  path_provider: ^2.1.2
  gal: ^2.3.0
  share_plus: ^11.0.0
  device_info_plus: ^11.0.0
  flutter_native_splash: ^2.4.1
  flutter_colorpicker: ^1.1.0
  http: ^1.6.0
  image_background_remover: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  adaptive_icon_background: "#2A004F"
  adaptive_icon_foreground: "assets/app_icon.png"

flutter_native_splash:
  color: "#120022"
  image: assets/splash.jpg
  android: true
  ios: true
  fullscreen: true

flutter:
  uses-material-design: true

  assets:
    - assets/app_icon.png
    - assets/splash.jpg

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf

    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-Regular.ttf

    - family: Oswald
      fonts:
        - asset: assets/fonts/Oswald-Regular.ttf

    - family: Lato
      fonts:
        - asset: assets/fonts/Lato-Regular.ttf  
        
          